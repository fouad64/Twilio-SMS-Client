<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registration Failed — Twilio SMS</title>

        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

        <style>

            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
            }

            body{
                min-height:100vh;
                background:#080608;
                color:white;
                display:flex;
                justify-content:center;
                align-items:center;
                font-family:'DM Sans',sans-serif;
                overflow:hidden;
            }

            body::before{
                content:'';
                position:fixed;
                inset:0;
                background:
                    linear-gradient(rgba(232,23,60,.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(232,23,60,.04) 1px, transparent 1px);
                background-size:80px 80px;
            }

            .bg-blob{
                position:fixed;
                border-radius:50%;
                filter:blur(80px);
            }

            .blob1{
                width:700px;
                height:700px;
                background:rgba(232,23,60,.22);
                top:-250px;
                left:-250px;
            }

            .blob2{
                width:600px;
                height:600px;
                background:rgba(232,23,60,.15);
                bottom:-250px;
                right:-250px;
            }

            .card{
                width:500px;
                max-width:90%;
                padding:45px;
                text-align:center;

                background:rgba(15,8,15,.85);

                border:1px solid rgba(232,23,60,.25);

                backdrop-filter:blur(25px);

                border-radius:30px;

                box-shadow:
                    0 20px 60px rgba(0,0,0,.6),
                    0 0 80px rgba(232,23,60,.15);
            }

            .icon{
                width:110px;
                height:110px;
                margin:auto;

                border-radius:50%;

                display:flex;
                justify-content:center;
                align-items:center;

                background:
                    linear-gradient(
                    135deg,
                    rgba(232,23,60,.25),
                    rgba(232,23,60,.4)
                    );

                box-shadow:
                    0 0 40px rgba(232,23,60,.35);
            }

            .icon svg{
                width:50px;
                height:50px;
                stroke:#ff7b8d;
            }

            .badge{
                margin-top:25px;
                color:#ff8fa0;
                text-transform:uppercase;
                font-size:.75rem;
                letter-spacing:2px;
            }

            h1{
                margin-top:18px;
                font-family:'Syne',sans-serif;
                font-size:2.3rem;
                font-weight:800;
            }

            .desc{
                margin-top:15px;
                color:rgba(255,255,255,.7);
                line-height:1.8;
            }

            .info-box{
                margin-top:25px;

                padding:18px;

                border-radius:15px;

                background:
                    rgba(232,23,60,.08);

                border:
                    1px solid rgba(232,23,60,.2);

                color:#d8d8d8;
            }

            .info-box strong{
                color:#ff8fa0;
            }

            .actions{
                margin-top:30px;
                display:flex;
                gap:12px;
            }

            .btn{
                flex:1;
                text-decoration:none;
                padding:14px;
                border-radius:14px;
                font-weight:700;
                transition:.25s;
            }

            .btn-primary{
                background:#E8173C;
                color:white;
            }

            .btn-primary:hover{
                transform:translateY(-2px);
                box-shadow:0 10px 25px rgba(232,23,60,.4);
            }

            .btn-secondary{
                border:1px solid rgba(255,255,255,.1);
                color:white;
            }

            .btn-secondary:hover{
                background:rgba(255,255,255,.05);
            }

        </style>
    </head>

    <body>

        <div class="bg-blob blob1"></div>
        <div class="bg-blob blob2"></div>

        <div class="card">

            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5">
                <circle cx="12" cy="12" r="10"/>
                <path d="M15 9L9 15"/>
                <path d="M9 9L15 15"/>
                </svg>
            </div>

            <div class="badge">
                Registration Failed
            </div>

            <h1>Account Already Exists</h1>

            <p class="desc">
                We couldn't create your account because the
                username or email address is already being used.
            </p>

            <div class="info-box">
                <strong>Possible reasons:</strong><br><br>

                • Email address already registered.<br>
                • Username already taken.<br>
                • Both email and username already exist.
            </div>

            <div class="actions">

                <a href="../HTML/SIGNUP.html" class="btn btn-primary">
                    Try Again
                </a>

                <a href="../HTML/LOGIN.html" class="btn btn-secondary">
                    Sign In
                </a>

            </div>

        </div>

    </body>
</html>
