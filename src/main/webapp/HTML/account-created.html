<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Account Created — Twilio SMS Client</title>
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
        <style>
            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --red: #E8173C;
                --dark: #080608;
                --border: rgba(255,255,255,0.07);
                --text-muted: rgba(255,255,255,0.45);
                --text-dim: rgba(255,255,255,0.72);
            }
            body {
                font-family: 'DM Sans', sans-serif;
                background: #080608;
                color: #fff;
                min-height: 100vh;
                overflow-x: hidden;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image:
                    linear-gradient(rgba(232,23,60,0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(232,23,60,0.04) 1px, transparent 1px);
                background-size: 80px 80px;
                pointer-events: none;
                z-index: 1;
                mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
            }
            body::after {
                content: '';
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
                pointer-events: none;
                z-index: 1;
                opacity: 0.7;
            }
            .bg-blob {
                position: fixed;
                border-radius: 50%;
                pointer-events: none;
                z-index: 0;
            }
            .blob-1 {
                width:800px;
                height:800px;
                background:radial-gradient(circle at 40% 40%,rgba(22,163,74,0.25) 0%,rgba(15,100,45,0.1) 40%,transparent 70%);
                filter:blur(80px);
                top:-300px;
                left:-300px;
                animation:drift1 20s ease-in-out infinite alternate;
            }
            .blob-2 {
                width:600px;
                height:600px;
                background:radial-gradient(circle,rgba(22,163,74,0.15) 0%,transparent 70%);
                filter:blur(70px);
                bottom:-200px;
                right:-150px;
                animation:drift2 25s ease-in-out infinite alternate;
            }
            .blob-3 {
                width:400px;
                height:400px;
                background:radial-gradient(circle,rgba(74,222,128,0.1) 0%,transparent 70%);
                filter:blur(50px);
                top:50%;
                left:50%;
                transform:translate(-50%,-50%);
                animation:pulse 8s ease-in-out infinite;
            }
            @keyframes drift1{
                from{
                    transform:translate(0,0);
                }
                to{
                    transform:translate(80px,60px);
                }
            }
            @keyframes drift2{
                from{
                    transform:translate(0,0);
                }
                to{
                    transform:translate(-60px,-80px);
                }
            }
            @keyframes pulse{
                0%,100%{
                    opacity:0.5;
                    transform:translate(-50%,-50%) scale(1);
                }
                50%{
                    opacity:1;
                    transform:translate(-50%,-50%) scale(1.3);
                }
            }

            /* NAV */
            nav {
                position:fixed;
                top:0;
                left:0;
                right:0;
                z-index:100;
                display:flex;
                align-items:center;
                padding:1.2rem 3rem;
                border-bottom:1px solid var(--border);
                background:rgba(8,4,8,0.75);
                backdrop-filter:blur(20px);
                animation:slideDown 0.7s cubic-bezier(0.22,1,0.36,1) both;
            }
            @keyframes slideDown{
                from{
                    transform:translateY(-100%);
                    opacity:0;
                }
                to{
                    transform:translateY(0);
                    opacity:1;
                }
            }
            .logo{
                font-family:'Syne',sans-serif;
                font-weight:800;
                font-size:1.2rem;
                letter-spacing:-0.02em;
                display:flex;
                align-items:center;
                gap:0.6rem;
                text-decoration:none;
                color:#fff;
            }
            .logo-icon{
                width:32px;
                height:32px;
                background:var(--red);
                border-radius:8px;
                display:grid;
                place-items:center;
            }
            .logo-icon svg{
                width:18px;
                height:18px;
            }

            /* CARD */
            .card {
                position:relative;
                z-index:2;
                width:100%;
                max-width:480px;
                background:rgba(16,8,16,0.82);
                border:1px solid rgba(22,163,74,0.2);
                border-radius:28px;
                padding:3.5rem 3rem;
                backdrop-filter:blur(30px);
                box-shadow:0 0 0 1px rgba(255,255,255,0.03),0 40px 80px rgba(0,0,0,0.6),0 0 80px rgba(22,163,74,0.08),inset 0 1px 0 rgba(255,255,255,0.05);
                text-align:center;
                animation:fadeUp 0.9s 0.2s cubic-bezier(0.22,1,0.36,1) both;
                margin:0 1.5rem;
            }
            .card::before{
                content:'';
                position:absolute;
                top:0;
                left:10%;
                right:10%;
                height:1px;
                background:linear-gradient(90deg,transparent,rgba(22,163,74,0.6),transparent);
            }
            @keyframes fadeUp{
                from{
                    opacity:0;
                    transform:translateY(40px);
                }
                to{
                    opacity:1;
                    transform:translateY(0);
                }
            }

            /* SUCCESS ICON */
            .icon-wrap{
                width:96px;
                height:96px;
                margin:0 auto 2rem;
                position:relative;
            }
            .ring{
                position:absolute;
                inset:0;
                border-radius:50%;
                border:2px solid rgba(22,163,74,0.25);
                animation:ringOut 2.5s ease-in-out infinite;
            }
            .ring:nth-child(2){
                animation-delay:0.6s;
                border-color:rgba(22,163,74,0.12);
            }
            .ring:nth-child(3){
                animation-delay:1.2s;
                border-color:rgba(22,163,74,0.06);
            }
            @keyframes ringOut{
                0%{
                    transform:scale(1);
                    opacity:1;
                }
                100%{
                    transform:scale(2);
                    opacity:0;
                }
            }
            .icon-inner{
                position:absolute;
                inset:0;
                border-radius:50%;
                background:linear-gradient(135deg,#16a34a,#15803d);
                display:grid;
                place-items:center;
                box-shadow:0 0 40px rgba(22,163,74,0.5);
                animation:iconBounce 0.7s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
            }
            @keyframes iconBounce{
                from{
                    transform:scale(0);
                }
                to{
                    transform:scale(1);
                }
            }
            .icon-inner svg{
                width:44px;
                height:44px;
                stroke:#fff;
                stroke-width:2.5;
            }
            @keyframes drawCheck{
                from{
                    stroke-dashoffset:70;
                }
                to{
                    stroke-dashoffset:0;
                }
            }
            .check-path{
                stroke-dasharray:70;
                stroke-dashoffset:70;
                animation:drawCheck 0.7s 0.8s ease forwards;
            }

            /* CONFETTI */
            .confetti-field{
                position:fixed;
                inset:0;
                pointer-events:none;
                z-index:3;
                overflow:hidden;
            }
            .c-dot{
                position:absolute;
                border-radius:50%;
                animation:cFly var(--dur) ease-out var(--delay) forwards;
                opacity:0;
            }
            @keyframes cFly{
                0%{
                    opacity:1;
                    transform:translateY(0) rotate(0);
                }
                100%{
                    opacity:0;
                    transform:translateY(100vh) rotate(720deg);
                }
            }

            .badge{
                display:inline-flex;
                align-items:center;
                gap:0.5rem;
                padding:0.3rem 0.85rem;
                background:rgba(22,163,74,0.12);
                border:1px solid rgba(22,163,74,0.25);
                border-radius:100px;
                font-size:0.72rem;
                font-weight:500;
                color:#86efac;
                letter-spacing:0.06em;
                text-transform:uppercase;
                margin-bottom:1.2rem;
            }
            .badge-dot{
                width:6px;
                height:6px;
                background:#4ade80;
                border-radius:50%;
                animation:blink 1.5s ease-in-out infinite;
            }
            @keyframes blink{
                0%,100%{
                    opacity:1;
                }
                50%{
                    opacity:0.3;
                }
            }

            h1{
                font-family:'Syne',sans-serif;
                font-size:2rem;
                font-weight:800;
                letter-spacing:-0.03em;
                margin-bottom:0.7rem;
            }
            .desc{
                font-size:0.9rem;
                color:var(--text-muted);
                font-weight:300;
                line-height:1.7;
                margin-bottom:2.5rem;
                max-width:340px;
                margin-left:auto;
                margin-right:auto;
            }
            .desc strong{
                color:#86efac;
                font-weight:500;
            }

            /* INFO ROW */
            .info-row{
                display:flex;
                align-items:center;
                gap:0.75rem;
                padding:0.85rem 1.1rem;
                background:rgba(22,163,74,0.06);
                border:1px solid rgba(22,163,74,0.12);
                border-radius:12px;
                margin-bottom:2rem;
                text-align:left;
            }
            .info-row svg{
                width:18px;
                height:18px;
                stroke:#4ade80;
                flex-shrink:0;
            }
            .info-row-text{
                font-size:0.8rem;
                color:var(--text-dim);
                font-weight:300;
                line-height:1.5;
            }

            /* BUTTON */
            .btn-login{
                width:100%;
                padding:0.95rem;
                background:linear-gradient(135deg,#16a34a,#15803d);
                border:none;
                border-radius:13px;
                color:#fff;
                font-family:'Syne',sans-serif;
                font-size:0.95rem;
                font-weight:700;
                cursor:pointer;
                transition:all 0.25s;
                display:flex;
                align-items:center;
                justify-content:center;
                gap:0.5rem;
                text-decoration:none;
                position:relative;
                overflow:hidden;
            }
            .btn-login::before{
                content:'';
                position:absolute;
                inset:0;
                background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
                opacity:0;
                transition:opacity 0.2s;
            }
            .btn-login:hover{
                transform:translateY(-2px);
                box-shadow:0 12px 40px rgba(22,163,74,0.4);
            }
            .btn-login:hover::before{
                opacity:1;
            }
            .btn-login svg{
                width:16px;
                height:16px;
                stroke:currentColor;
                transition:transform 0.2s;
            }
            .btn-login:hover svg{
                transform:translateX(3px);
            }

            /* PARTICLES */
            .particle-field{
                position:fixed;
                inset:0;
                pointer-events:none;
                z-index:1;
                overflow:hidden;
            }
            .sms-particle{
                position:absolute;
                background:rgba(8,24,14,0.85);
                border:1px solid rgba(22,163,74,0.3);
                border-radius:10px;
                padding:5px 11px;
                font-size:0.62rem;
                color:rgba(255,255,255,0.55);
                font-family:'DM Sans',sans-serif;
                white-space:nowrap;
                opacity:0;
                pointer-events:none;
            }
        </style>
    </head>
    <body>

        <div class="bg-blob blob-1"></div>
        <div class="bg-blob blob-2"></div>
        <div class="bg-blob blob-3"></div>
        <div class="particle-field" id="particleField"></div>
        <div class="confetti-field" id="confettiField"></div>

        <nav>
            <a href="../HTML/HOME.html" class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 18 18" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 4H2a1 1 0 00-1 1v8a1 1 0 001 1h12l3 2V5a1 1 0 00-1-1z"/>
                    </svg>
                </div>
                Twilio SMS
            </a>
        </nav>

        <div class="card">
            <!-- Icon -->
            <div class="icon-wrap">
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="icon-inner">
                    <svg viewBox="0 0 44 44" fill="none" stroke-linecap="round" stroke-linejoin="round">
                    <path class="check-path" d="M9 22l9 10 17-19"/>
                    </svg>
                </div>
            </div>

            <div class="badge"><span class="badge-dot"></span>Verified & Active</div>
            <h1>Account Created! 🎉</h1>
            <p class="desc">
                Your account has been <strong>successfully verified</strong> and is now active.
                You can now log in and start sending SMS messages worldwide.
            </p>

            <div class="info-row">
                <svg viewBox="0 0 18 18" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="9" r="7.5"/><path d="M9 6v3.5l2.5 1.5"/>
                </svg>
                <div class="info-row-text">
                    Your Twilio credentials are saved. You can manage campaigns and contacts from your Customer Dashboard.
                </div>
            </div>

            <a href="../HTML/LOGIN.html" class="btn-login">
                Go to Login
                <svg viewBox="0 0 16 16" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 8h10M9 4l4 4-4 4"/>
                </svg>
            </a>
        </div>

        <script>
        // Confetti burst on load
            window.addEventListener('load', () => {
                const field = document.getElementById('confettiField');
                const colors = ['#4ade80', '#16a34a', '#86efac', '#fbbf24', '#60a5fa', '#f472b6', '#E8173C'];
                for (let i = 0; i < 80; i++) {
                    const dot = document.createElement('div');
                    dot.className = 'c-dot';
                    const size = 6 + Math.random() * 8;
                    dot.style.cssText = `
              width:${size}px;height:${size}px;
              background:${colors[Math.floor(Math.random() * colors.length)]};
              left:${Math.random() * 100}vw;
              top:-20px;
              --dur:${1.5 + Math.random() * 2}s;
              --delay:${Math.random() * 0.8}s;
            `;
                    field.appendChild(dot);
                    setTimeout(() => dot.remove(), 3500);
                }
            });

        // Floating particles
            const texts = ['Account active ✓', 'Verified 🎉', 'SMS ready 🚀', 'Twilio connected', 'Welcome aboard!', 'Let\'s go →', 'All systems go'];
            function spawnParticle() {
                const field = document.getElementById('particleField');
                const p = document.createElement('div');
                p.className = 'sms-particle';
                p.textContent = texts[Math.floor(Math.random() * texts.length)];
                const fromLeft = Math.random() > 0.5;
                p.style.cssText = `top:${10 + Math.random() * 80}%;${fromLeft ? 'left:-160px;' : 'right:-160px;'}opacity:0;`;
                field.appendChild(p);
                const dur = 7000 + Math.random() * 4000;
                const endX = fromLeft ? (40 + Math.random() * 30) + 'vw' : (-40 - Math.random() * 30) + 'vw';
                p.animate([
                    {opacity: 0, transform: 'translateX(0)'},
                    {opacity: 0.7, transform: `translateX(${fromLeft ? '30px' : '-30px'})`, offset: 0.08},
                    {opacity: 0.4, transform: `translateX(${endX}) translateY(${-15 + Math.random() * 30}px)`, offset: 0.85},
                    {opacity: 0, transform: `translateX(${endX}) translateY(${-25 + Math.random() * 50}px)`}
                ], {duration: dur, easing: 'ease-in-out', fill: 'forwards'});
                setTimeout(() => p.remove(), dur + 100);
            }
            spawnParticle();
            setInterval(spawnParticle, 3000);
        </script>
    </body>
</html>
